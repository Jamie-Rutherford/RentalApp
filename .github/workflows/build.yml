name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Install MAUI Android workload
      run: dotnet workload install maui-android

    - name: Restore Database project
      run: dotnet restore StarterApp.Database/StarterApp.Database.csproj

    - name: Build Database project
      run: dotnet build StarterApp.Database/StarterApp.Database.csproj --no-restore

    - name: Restore Android app
      run: dotnet restore StarterApp/StarterApp.csproj -p:TargetFrameworks=net9.0-android -p:RuntimeIdentifier=android-arm64

    - name: Build Android app
      run: dotnet build StarterApp/StarterApp.csproj -f net9.0-android -p:TargetFrameworks=net9.0-android --no-restore
